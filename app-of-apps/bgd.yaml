apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bgd
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: https://github.com/stolarware/gitops-lab.git
    targetRevision: main
    path: apps/bgd

  destination:
    server: https://kubernetes.default.svc
    namespace: bgd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
