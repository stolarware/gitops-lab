apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: https://github.com/stolarware/gitops-lab.git
    targetRevision: main
    path: apps/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
